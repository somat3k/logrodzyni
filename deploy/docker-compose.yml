version: '3.9'

networks:
  proxy-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  certs:

services:
  # ── Proxy core nodes ──────────────────────────────────────────────────────
  ingress:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.proxy-core
    image: proxy-core:latest
    container_name: proxy-ingress
    networks:
      proxy-net:
        ipv4_address: 172.28.0.10
    ports:
      - "1080:1080"   # SOCKS5
      - "8080:8080"   # HTTP CONNECT
    volumes:
      - certs:/etc/proxy-core/certs:ro
      - ./configs/ingress.conf:/etc/proxy-core/proxy.conf:ro
    environment:
      # NODE_ROLE is informational; configure the actual role via the mounted proxy.conf.
      - NODE_ROLE=ingress
    restart: unless-stopped
    healthcheck:
      # 0438 = port 1080 in little-endian hex; 0A = TCP state LISTEN
      test: ["CMD-SHELL", "grep -qE '^[[:space:]]*[0-9]+: [0-9A-F]{8}:0438 .* 0A ' /proc/net/tcp || grep -qE '^[[:space:]]*[0-9]+: [0-9A-F]{32}:0438 .* 0A ' /proc/net/tcp6"]
      interval: 30s
      timeout: 5s
      retries: 3

  relay:
    image: proxy-core:latest
    container_name: proxy-relay
    networks:
      proxy-net:
        ipv4_address: 172.28.0.11
    volumes:
      - certs:/etc/proxy-core/certs:ro
      - ./configs/relay.conf:/etc/proxy-core/proxy.conf:ro
    environment:
      # NODE_ROLE is informational; configure the actual role via the mounted relay.conf.
      - NODE_ROLE=relay
    restart: unless-stopped
    depends_on:
      - egress

  egress:
    image: proxy-core:latest
    container_name: proxy-egress
    networks:
      proxy-net:
        ipv4_address: 172.28.0.12
    volumes:
      - certs:/etc/proxy-core/certs:ro
      - ./configs/egress.conf:/etc/proxy-core/proxy.conf:ro
    environment:
      # NODE_ROLE is informational; configure the actual role via the mounted egress.conf.
      - NODE_ROLE=egress
    restart: unless-stopped

  # ── Web control plane ─────────────────────────────────────────────────────
  web-app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web-app
    image: proxy-web-app:latest
    container_name: proxy-web-app
    networks:
      proxy-net:
        ipv4_address: 172.28.0.20
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=8h
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:3000/healthz', r => process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: proxy-nginx
    networks:
      proxy-net:
        ipv4_address: 172.28.0.30
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/nginx/certs:ro
    depends_on:
      - web-app
    restart: unless-stopped
